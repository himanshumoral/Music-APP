<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="album-details.css">
</head>
<body>

    <nav>
        <h2>🎵 Music App</h2>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="album.html">Album</a>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>
    <div class="div">
    <h1 id="albumTitle">Songs</h1>
    <img id="updateAlbumBtn" class="AlbumTit" src="https://cdn-icons-png.flaticon.com/512/282/282122.png" alt="Album Name Update">
    <img class="AlbumTit" id="deleteAlbumBtn" src="https://cdn-icons-png.flaticon.com/512/6048/6048190.png" alt="Album Delete">
    </div>
    <div class="music-container" id="musicContainer"></div>

    <div class="player" id="player">
    <div class="player-info">
        <img id="playerImg" src="" alt="">
        <div>
            <h4 id="playerTitle">No song playing</h4>
            <p id="playerArtist"></p>
        </div>
    </div>
    <div class="player-controls">
        <button id="prevBtn">⏮</button>
        <button id="playPauseBtn">⏸</button>
        <button id="nextBtn">⏭</button>
        <input type="range" id="progressBar" value="0" min="0" max="100">
        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
    </div>

<audio id="audioPlayer"></audio>
    </div>
    <script src="album-details.js"></script>
</body>
</html>
